name: Pralkowcy Elektorda Scraper + Analyzer + Validator

on:
  schedule:
    # 02:00 UTC = 03:00 CET (Europa)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  # =============================================================================
  # JOB 1: PHASE 2 — SCRAPER (02:00 UTC)
  # =============================================================================
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Chrome for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas selenium webdriver-manager

      - name: Run Scraper (Phase 2)
        run: python scraper_production.py
        env:
          PYTHONUNBUFFERED: 1
          SCRAPER_TEST_MODE: 'true'
        timeout-minutes: 180

      - name: Upload raw data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-threads
          path: data/raw/threads_*.json
          retention-days: 90

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/scraper_production_*.log
          retention-days: 90

  # =============================================================================
  # JOB 2: PHASE 3 — ANALYZER (czeka na scraper)
  # =============================================================================
  analyzer:
    needs: scraper
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic pandas

      - name: Download raw data
        uses: actions/download-artifact@v4
        with:
          name: raw-threads
          path: data/raw/

      - name: Run Analyzer (Phase 3)
        run: python analyzer_claude.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: 1
        timeout-minutes: 90

      - name: Upload analyzed data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-data
          path: data/parsed/analyzed_*.json
          retention-days: 90

      - name: Upload SQL inserts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-inserts
          path: db/inserts_*.sql
          retention-days: 90

      - name: Upload analyzer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-logs
          path: logs/analyzer_claude_*.log
          retention-days: 90

  # =============================================================================
  # JOB 3: VALIDATOR (czeka na analyzer)
  # =============================================================================
  validator:
    needs: analyzer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Download SQL inserts
        uses: actions/download-artifact@v4
        with:
          name: sql-inserts
          path: db/

      - name: Run Validator (Phase 4)
        run: python validator_sql.py
        timeout-minutes: 15

      - name: Upload validator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validator-logs
          path: logs/validator_sql_*.log
          retention-days: 90

  # =============================================================================
  # JOB 4: REPORT
  # =============================================================================
  report:
    needs: [scraper, analyzer, validator]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate status report
        run: |
          echo "========================================"
          echo "PRALKOWCY SCRAPER - STATUS REPORT"
          echo "========================================"
          echo "Scraper:   ${{ needs.scraper.result }}"
          echo "Analyzer:  ${{ needs.analyzer.result }}"
          echo "Validator: ${{ needs.validator.result }}"
          echo "========================================"
          echo ""
          echo "📂 Artifacts: GitHub Actions > Artifacts"
          echo "📋 Logs: Download z artifact: scraper-logs, analyzer-logs, validator-logs"
          echo ""
          if [ "${{ needs.validator.result }}" = "success" ]; then
            echo "✅ SUKCES! SQL gotowy do Supabase"
          else
            echo "❌ Błędy! Sprawdź logi"
          fi
